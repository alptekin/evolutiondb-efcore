name: NuGet Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal --filter "FullyQualifiedName!~Integration"

      - name: Pack evosql
        run: dotnet pack src/evosql/evosql.csproj -c Release --no-build -o ./nupkg

      - name: Pack EvolutionDb.EntityFrameworkCore
        run: dotnet pack src/EvolutionDb.EntityFrameworkCore/EvolutionDb.EntityFrameworkCore.csproj -c Release --no-build -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
